<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page not found — Simplified Management</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/svg+xml" href="/simplified-management-site/favicon.svg" />
    <style>
      :root { --accent: #2563eb; --text: #0f172a; --muted: #64748b; --bg: #ffffff; }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
        background: var(--bg); color: var(--text);
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; text-align: center; padding: 2rem;
      }
      .wrap { max-width: 540px; }
      .mark { width: 48px; height: 48px; border-radius: 12px; background: var(--accent); margin: 0 auto 1.5rem; }
      h1 { font-size: clamp(3rem, 12vw, 5rem); margin: 0; font-weight: 800; letter-spacing: -2px; }
      p { color: var(--muted); font-size: 1.1rem; line-height: 1.6; margin: 0.75rem 0 2rem; }
      a.btn {
        display: inline-block; background: var(--accent); color: #fff; text-decoration: none;
        padding: 0.85rem 1.75rem; border-radius: 10px; font-weight: 600;
      }
      a.btn:hover { opacity: 0.92; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="mark"></div>
      <h1>404</h1>
      <p>That page doesn't exist or has moved. Let's get you back to managing your properties.</p>
      <a class="btn" href="/simplified-management-site/">Back to Home</a>
    </div>
  </body>
</html>
